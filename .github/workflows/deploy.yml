name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # Lets you re-deploy by hand from the Actions tab.
  workflow_dispatch:

# Allow the workflow to publish a Pages artifact.
permissions:
  contents: read
  pages: write
  id-token: write

# Never run two deploys at once; let an in-flight one finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        # The site is served from https://<user>.github.io/<repo>/, so every URL
        # Next emits — and every hand-written asset path — needs that prefix.
        env:
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}
        run: npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
